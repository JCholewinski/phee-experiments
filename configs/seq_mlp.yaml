training:
  output_dir: outputs/seq/mlp
  output_dir_final: outputs/seq/mlp/final
  per_device_train_batch_size: 8
  num_train_epochs: 2
  logging_steps: 10
  learning_rate: 0.00005
  save_strategy: epoch

model:
  name: bert-base-cased
  head_type: mlp
  mlp_hidden_size: 256
  mlp_dropout: 0.1
  mlp_activation: gelu

data:
  train_path: data/raw/train_main.json
  test_path: data/raw/test_main.json
  val_path: data/raw/val_main.json
